name: Build news

# When an editor saves a news item in Pages CMS (a change under content/news/),
# regenerate the article pages + homepage cards and commit them back.
on:
  push:
    paths:
      - 'content/news/**'
      - 'templates/news-article.*.html'
      - 'scripts/build_news.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install markdown
      - run: python scripts/build_news.py
      - name: Commit regenerated pages
        run: |
          git config user.name "gdbop-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add novini en/novini index.html en/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Rebuild news pages from CMS content"
            git push
          fi
